apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: githubscaffoldingwithcompositionpage-test-04-composition-resources
  namespace: kube-node-lease
spec:
  api:
  # -------------------------------------------------------------------------
  # 1. GET THE COMPOSITION
  #    We need the 'status.managed' list to know what to look for.
  #    Note: status.managed contains: apiVersion, name, namespace, path, resource
  #    It does NOT contain 'kind' - we must resolve that from discovery.
  # -------------------------------------------------------------------------
  - name: getComposition
    path: "/apis/composition.krateo.io/v1-2-5/namespaces/kube-node-lease/githubscaffoldingwithcompositionpages/test-04"
    verb: GET

  # -------------------------------------------------------------------------
  # 2. DISCOVERY
  #    Query the API server for the API definitions.
  #    Response structure:
  #     
  #      "groupVersion": "rbac.authorization.k8s.io/v1",
  #      "resources": [
  #        {"name": "clusterroles", "kind": "ClusterRole", "namespaced": false, ...},
  #        {"name": "roles", "kind": "Role", "namespaced": true, ...}
  #      ]
  #    }
  # -------------------------------------------------------------------------
  - name: discovery
    dependsOn:
      name: getComposition
      iterator: "[.getComposition.status.managed[] | .apiVersion] | unique"
    path: "${ if . == \"v1\" then \"/api/v1\" else \"/apis/\" + . end }"
    verb: GET
    continueOnError: true

  # -------------------------------------------------------------------------
  # 3. FETCH RESOURCES
  #    Build a lookup map from discovery: "apiVersion/resource" -> {kind, namespaced}
  #    Use this to construct correct paths (no namespace for cluster-scoped).
  # -------------------------------------------------------------------------
  - name: allCompositionResources
    dependsOn:
      name: discovery
      iterator: >
        (
          # A. Build a Map: "apiVersion/resource" -> {kind, namespaced}
          # Example key: "rbac.authorization.k8s.io/v1/clusterroles"
          # Example value: {kind: "ClusterRole", namespaced: false}
          (
            [.discovery[] | select(type == "object" and .groupVersion != null and .resources != null)] 
            | map(
                .groupVersion as $gv | 
                .resources[] | 
                { ("\($gv)/\(.name)"): {kind: .kind, namespaced: .namespaced} }
              ) 
            | add // {}
          ) as $resourceMap |

          # B. Iterate over managed resources to build paths
          .getComposition.status.managed | map(
            . as $m |
            
            # Look up resource info: key is "apiVersion/resource"
            # e.g. "rbac.authorization.k8s.io/v1/clusterroles"
            $resourceMap["\($m.apiVersion)/\($m.resource)"] as $info |
            
            # Extract namespaced flag (default to true if unknown)
            (if $info != null then $info.namespaced else true end) as $isNs |
            
            # Determine API base
            (if $m.apiVersion == "v1" then "/api/v1" else "/apis/\($m.apiVersion)" end) as $apiBase |
            
            # C. Construct Path - cluster-scoped resources NEVER get namespace in path
            if $isNs then
               "\($apiBase)/namespaces/\($m.namespace)/\($m.resource)/\($m.name)"
            else
               "\($apiBase)/\($m.resource)/\($m.name)"
            end
          )
        )
    path: ${ . }
    continueOnError: true
    errorKey: allCompositionResourcesError

  # -------------------------------------------------------------------------
  # 4. FILTER & OUTPUT
  #    Match fetched resources to managed list, resolve Kind from discovery,
  #    create fallback objects for unavailable resources.
  #    IMPORTANT: Always preserve namespace from status.managed for display,
  #    even for cluster-scoped resources (which may have "wrong" namespace).
  # -------------------------------------------------------------------------
  filter: >
    {
      getComposition: .getComposition,
      allCompositionResources: 
        (
          # --- PREPARATION ---
          # Build the resourceMap: "apiVersion/resource" -> {kind, namespaced}
          (
            [.discovery[] | select(type == "object" and .groupVersion != null and .resources != null)] 
            | map(
                .groupVersion as $gv | 
                .resources[] | 
                { ("\($gv)/\(.name)"): {kind: .kind, namespaced: .namespaced} }
              ) 
            | add // {}
          ) as $resourceMap |

          # Handle case where nothing was fetched
          (.allCompositionResources // []) as $fetchedList |
          
          # --- PROCESSING ---
          .getComposition.status.managed | map(
            . as $managed |
            
            # Look up resource info
            $resourceMap["\($managed.apiVersion)/\($managed.resource)"] as $info |
            (if $info != null then $info.namespaced else true end) as $isNs |
            (if $info != null then $info.kind else null end) as $resolvedKind |
            
            # Find the fetched resource in the list
            # Match by: name, apiVersion, and (namespace if namespaced OR ignore if cluster-scoped)
            (
              $fetchedList | map(select(
                .metadata.name == $managed.name and 
                .apiVersion == $managed.apiVersion and
                (
                  if $isNs then 
                     # Namespaced: must match namespace
                     ((.metadata.namespace // "") == ($managed.namespace // ""))
                  else 
                     # Cluster-scoped: ignore namespace entirely
                     true 
                  end
                )
              )) | first
            ) as $found |
            
            if $found then
              # Resource was fetched successfully
              # Override namespace with the one from status.managed to preserve "wrong" namespace for display
              $found | .metadata.namespace = ($managed.namespace // null)
            else
              # --- FALLBACK: CREATE "UNAVAILABLE" OBJECT ---
              # status.managed does NOT contain 'kind', only 'resource' (plural lowercase)
              # We resolve Kind from discovery, or fall back to resource name
              # Always preserve namespace from status.managed for display
              {
                apiVersion: $managed.apiVersion,
                kind: ($resolvedKind // $managed.resource),
                metadata: {
                  name: $managed.name,
                  namespace: ($managed.namespace // null)
                },
                status: {
                  conditions: [
                    {
                      type: "Ready",
                      status: "False",
                      reason: "Resource Unavailable"
                    }
                  ]
                }
              }
            end
          )
        )
        # --- CLEANUP: Remove Widgets and Self ---
        | map(select(
            (
              (.apiVersion | startswith("wissdgets.templates.krateo.io/")) or
              (.apiVersion == "templates.kratesso.io/v1" and .kind == "RESTAction")
            ) | not
          ))
        # --- SORTING: Unhealthy first ---
        | sort_by(
            (
              # 1. Ready Condition Check
              if (.status.conditions? // [] | map(select(.type == "Ready")) | length > 0) then
                (.status.conditions[] | select(.type == "Ready").status) != "False"
              
              # 2. Core V1 Resources (assume healthy if present)
              elif (.apiVersion == "v1" and (
                  .kind == "ConfigMap" or 
                  .kind == "Secret" or 
                  .kind == "Service" or 
                  .kind == "ServiceAccount" or
                  .kind == "PersistentVolumeClaim"
              )) then
                true
              
              # 3. RBAC Resources (assume healthy if present)
              elif (.apiVersion | startswith("rbac.authorization.k8s.io")) then
                true

              # 4. Generic Condition Check (any condition not False)
              elif (.status.conditions? | length > 0) then
                (.status.conditions[0].status) != "False"
              
              # 5. Default Healthy
              else
                true
              end
            ), .kind, .metadata.name
        )
    }
